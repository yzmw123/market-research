name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/validate_skill.py
      - run: python scripts/run_evals.py --validate
      - run: pytest -q
      - run: python scripts/validate_evidence.py tests/fixtures/sample-evidence.yaml
      - run: python scripts/render_report.py tests/fixtures/sample-report.md /tmp/sample-report.html --generated-at 2026-07-13
      - run: python scripts/validate_report.py tests/fixtures/sample-report.md --evidence tests/fixtures/sample-evidence.yaml --html /tmp/sample-report.html
